name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# WIF で OIDC トークンを取得するには workflow レベルで宣言が必要
# job レベルのみだとリポジトリのデフォルト設定によって id-token が無効になる
permissions:
  contents: read
  id-token: write

env:
  REGION: asia-northeast1
  APP_NAME: guitar-tab-bot
  IMAGE: asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/guitar-tab-bot/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # vars コンテキストは GitHub の
      # Settings > Secrets and variables > Actions > Variables タブで設定する
      # (Secrets タブではなく Variables タブ)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          # NEXT_PUBLIC_APP_URL は GitHub Variables に登録されている場合のみ渡す
          ENV_FLAGS=""
          if [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ]; then
            ENV_FLAGS="--set-env-vars NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}"
          fi
          gcloud run deploy ${{ env.APP_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --set-secrets ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,MONGODB_URI=MONGODB_URI:latest \
            $ENV_FLAGS \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.APP_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)"
